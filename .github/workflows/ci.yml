name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']

    steps:
      - name: Checkout (with corpus submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        uses: ramsey/composer-install@v3
        with:
          dependency-versions: highest
          # 8.5 is newer than some dev tools' declared support; ignore only the PHP upper bound.
          composer-options: "--ignore-platform-req=php+"

      - name: Run tests
        run: composer test
